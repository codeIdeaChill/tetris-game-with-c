<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Raylib Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5rem;
      color: #38bdf8;
    }

    #game-container {
      margin-top: 20px;
    }

    canvas {
      border: 3px solid #38bdf8;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(56,189,248,0.5);
    }

    .controls {
      margin-top: 15px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .loader {
      border: 6px solid #1e293b;
      border-top: 6px solid #38bdf8;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    #footer {
      margin-top: 20px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- شاشة تحميل -->
  <div id="loading">
    <div class="loader"></div>
    <p>Loading game...</p>
  </div>

  <h1>🎮 Tetris Game</h1>

  <div id="game-container">
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls">
    <button onclick="fullscreen()">Fullscreen</button>
    <button onclick="reloadGame()">Restart</button>
  </div>

  <div id="footer">
    Made with Raylib + WebAssembly
  </div>

  <!-- ملف Emscripten -->
  <script>
    var Module = {
      canvas: document.getElementById('canvas'),
      onRuntimeInitialized: function() {
        document.getElementById('loading').style.display = 'none';
      }
    };

    function fullscreen() {
      let canvas = document.getElementById("canvas");
      if (canvas.requestFullscreen) {
        canvas.requestFullscreen();
      }
    }

    function reloadGame() {
      location.reload();
    }
  </script>

  <!-- غيّر الاسم حسب ملفك -->
    {{{ SCRIPT }}}

</body>
</html>
